[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "maverick-oss"
version = "0.1.0"
description = "Cognitive-based multi-agent pipeline for improving image descriptions generated by Vision-Language Models."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MPL-2.0" }
authors = [
    { name = "Eduardo J. Barrios" }
]
keywords = ["multi-agent systems", "vision-language models", "explainable AI"]
dependencies = [
    "openai>=1.0.0",
    "streamlit>=1.32.0",
    "pillow>=10.0.0",
    "python-dotenv>=1.0.0",
]

[tool.setuptools.packages.find]
where = ["src"]
