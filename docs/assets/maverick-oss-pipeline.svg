<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">maverick-oss reference-free multi-agent workflow</title>
  <desc id="desc">A minimal workflow diagram showing A1 Identifier, A2 Descriptor, A3 Critic, and A4 Refiner producing a reference-free final description.</desc>
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#26364f"/>
    </marker>
    <filter id="shadow" x="-8%" y="-10%" width="116%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#17345f" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f8fbff; }
      .title { fill: #17345f; font: 700 34px Arial, Helvetica, sans-serif; text-anchor: middle; }
      .subtitle { fill: #52627a; font: italic 20px Arial, Helvetica, sans-serif; text-anchor: middle; }
      .node { fill: #ffffff; stroke: #78a6ff; stroke-width: 3; filter: url(#shadow); }
      .number { fill: #3568d4; }
      .number-text { fill: #ffffff; font: 700 30px Arial, Helvetica, sans-serif; text-anchor: middle; dominant-baseline: central; }
      .agent { fill: #123f96; font: 700 24px Arial, Helvetica, sans-serif; text-anchor: middle; }
      .stage { fill: #26364f; font: 18px Arial, Helvetica, sans-serif; text-anchor: middle; }
      .arrow { stroke: #26364f; stroke-width: 5; fill: none; marker-end: url(#arrow); }
      .output { fill: #ffffff; stroke: #3568d4; stroke-width: 3; filter: url(#shadow); }
      .output-text { fill: #154aa8; font: 700 22px Arial, Helvetica, sans-serif; text-anchor: middle; }
      .note { fill: #6b5617; font: 16px Arial, Helvetica, sans-serif; text-anchor: middle; }
      .note-box { fill: #fffdf6; stroke: #c6a24a; stroke-width: 2.4; stroke-dasharray: 10 7; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="360"/>
  <text class="title" x="640" y="46">maverick-oss Reference-Free Pipeline</text>
  <text class="subtitle" x="640" y="76">Cognitive-inspired multi-agent refinement of VLM image descriptions</text>

  <g transform="translate(70 120)">
    <rect class="node" x="0" y="0" width="220" height="120" rx="20"/>
    <circle class="number" cx="52" cy="60" r="30"/>
    <text class="number-text" x="52" y="60">1</text>
    <text class="agent" x="138" y="52">A1</text>
    <text class="stage" x="138" y="82">Identifier</text>
  </g>

  <path class="arrow" d="M310 180 H372"/>

  <g transform="translate(395 120)">
    <rect class="node" x="0" y="0" width="220" height="120" rx="20"/>
    <circle class="number" cx="52" cy="60" r="30"/>
    <text class="number-text" x="52" y="60">2</text>
    <text class="agent" x="138" y="52">A2</text>
    <text class="stage" x="138" y="82">Descriptor</text>
  </g>

  <path class="arrow" d="M635 180 H697"/>

  <g transform="translate(720 120)">
    <rect class="node" x="0" y="0" width="220" height="120" rx="20"/>
    <circle class="number" cx="52" cy="60" r="30"/>
    <text class="number-text" x="52" y="60">3</text>
    <text class="agent" x="138" y="52">A3</text>
    <text class="stage" x="138" y="82">Critic</text>
  </g>

  <path class="arrow" d="M960 180 H1022"/>

  <g transform="translate(1045 120)">
    <rect class="node" x="0" y="0" width="220" height="120" rx="20"/>
    <circle class="number" cx="52" cy="60" r="30"/>
    <text class="number-text" x="52" y="60">4</text>
    <text class="agent" x="138" y="52">A4</text>
    <text class="stage" x="138" y="82">Refiner</text>
  </g>

  <g transform="translate(365 278)">
    <rect class="note-box" x="0" y="0" width="260" height="44" rx="14"/>
    <text class="note" x="130" y="28">No reference comparison</text>
  </g>

  <g transform="translate(655 278)">
    <rect class="note-box" x="0" y="0" width="285" height="44" rx="14"/>
    <text class="note" x="142.5" y="28">No unpublished metrics</text>
  </g>

  <path class="arrow" d="M1155 242 V276 H1045"/>
  <g transform="translate(955 278)">
    <rect class="output" x="0" y="0" width="290" height="54" rx="16"/>
    <text class="output-text" x="145" y="34">Final description</text>
  </g>
</svg>
